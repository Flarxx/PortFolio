{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Portafolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    
    </head>
<body>
    <div class="sidebar">
        <div class="profile">
            <img src="{% static 'img/FOTO-PRUEBA.png' %}" alt="Perfil">
            <h2><span class="develo1">FULLSTACK</span> <span class="develo">DEVELOPER</span></h2>
        </div>
        <nav>
            <ul>
                <li>
                    <a href="{% url 'home' %}">
                        <i data-feather="home"></i> Inicio
                    </a>
                </li>
                <li>
                    <a href="{% url 'proyectos' %}">
                        <i data-feather="folder"></i> Proyectos
                    </a>
                </li>
                <li>
                    <a href="{% url 'contacto' %}">
                        <i data-feather="mail"></i> Contacto
                    </a>
                </li>
                <li>
                    <a href="{% url 'certificados' %}">
                        <i data-feather="award"></i> Certificados
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://unpkg.com/feather-icons"></script>
    
    <script>
        feather.replace();
    </script>
</body>
</html>
